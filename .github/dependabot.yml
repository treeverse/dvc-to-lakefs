version: 2

updates:
  - directory: "/"
    package-ecosystem: "github-actions"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns:
        - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - directory: "/"
    package-ecosystem: "pre-commit"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
