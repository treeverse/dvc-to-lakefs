name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        pyv: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@v6.3.0
      with:
        python-version: ${{ matrix.pyv }}
    - uses: astral-sh/setup-uv@v8.3.0
      with:
        cache-dependency-glob: pyproject.toml
        cache-suffix: tests-${{ matrix.pyv }}
        activate-environment: true
        # On macOS arm and on Windows, actions/setup-python caps Python 3.10 at 3.10.11, which
        # predates the tarfile data_filter backport (3.10.12+).
        python-version: ${{ steps.setup-python.outputs.python-version == '3.10.11' && '>3.10.11,<3.11' || '' }}
    - run: uv sync --locked --dev
    - uses: j178/prek-action@v2.0.4
    - name: run tests
      timeout-minutes: 15
      run: pytest
